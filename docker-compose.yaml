version: "3.9"

services:
  postgis:
    image: postgis/postgis:17-3.5
    container_name: urbanpulse-postgis

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geospatial

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: